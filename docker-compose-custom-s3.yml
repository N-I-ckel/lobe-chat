name: lobe-chat-database
services:
  postgresql:
    image: pgvector/pgvector:pg17
    container_name: lobe-postgres
    ports:
      - '5432:5432'
    volumes:
      - './data:/var/lib/postgresql/data'
    environment:
      - 'POSTGRES_DB=lobechat'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - lobe-network

  # Casdoor認証サービス
  casdoor:
    image: casbin/casdoor:v2.13.0
    container_name: lobe-casdoor
    entrypoint: /bin/sh -c './server --createDatabase=true'
    ports:
      - '8000:8000'
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      httpport: 8000
      RUNNING_IN_DOCKER: 'true'
      driverName: 'postgres'
      dataSourceName: 'user=postgres password=${POSTGRES_PASSWORD} host=postgresql port=5432 sslmode=disable dbname=casdoor'
      origin: '${AUTH_CASDOOR_ISSUER}'
      runmode: 'prod'
    volumes:
      - ./init_data.json:/init_data.json
    networks:
      - lobe-network

  lobe:
    image: lobehub/lobe-chat-database
    container_name: lobe-chat
    ports:
      - '3210:3210'
    depends_on:
      postgresql:
        condition: service_healthy
      casdoor:
        condition: service_started
    environment:
      # 基本設定
      - 'APP_URL=${APP_URL:-http://localhost:3210}'
      - 'NEXT_AUTH_SSO_PROVIDERS=casdoor'
      - 'KEY_VAULTS_SECRET=${KEY_VAULTS_SECRET}'
      - 'NEXT_AUTH_SECRET=${NEXT_AUTH_SECRET}'
      - 'AUTH_URL=${APP_URL}/api/auth'
      
      # Casdoor認証設定
      - 'AUTH_CASDOOR_ISSUER=${AUTH_CASDOOR_ISSUER}'
      - 'AUTH_CASDOOR_ID=${AUTH_CASDOOR_ID}'
      - 'AUTH_CASDOOR_SECRET=${AUTH_CASDOOR_SECRET}'
      
      # データベース設定
      - 'DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgresql:5432/lobechat'
      
      # S3設定（外部S3サービスを使用）
      - 'S3_ENDPOINT=${S3_ENDPOINT}'
      - 'S3_BUCKET=${S3_BUCKET}'
      - 'S3_PUBLIC_DOMAIN=${S3_PUBLIC_DOMAIN}'
      - 'S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}'
      - 'S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}'
      - 'S3_ENABLE_PATH_STYLE=${S3_ENABLE_PATH_STYLE:-0}'
      - 'S3_SET_ACL=${S3_SET_ACL:-0}'
      - 'LLM_VISION_IMAGE_USE_BASE64=1'
      
      # AIプロバイダー設定（必要に応じて追加）
      - 'OPENAI_API_KEY=${OPENAI_API_KEY:-}'
      - 'ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}'
    env_file:
      - .env
    restart: always
    networks:
      - lobe-network

volumes:
  data:
    driver: local

networks:
  lobe-network:
    driver: bridge